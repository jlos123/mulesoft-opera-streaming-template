# Anypoint MQ handoff (non-secret - see secure.properties.sample for credentials)
anypoint.mq.url=https://mq-eu-west-2.anypoint.mulesoft.com/api/v1/organizations/YOUR_ORG_ID/environments/YOUR_ENVIRONMENT_ID
ohip.mq.consumerDestination=your-queue-name
# Consumer parallelism. Order no longer matters under orchestration, so raise this to backend/REST-rate-limit
ohip.mq.consumerConcurrency=4

# --- Circuit breaker: OHIP-outage guard (the design notes) ---------------------------------------------------
# When the orchestration re-fetch keeps failing because OHIP REST is DOWN, the subscriber's circuit
# breaker trips and STOPS polling MQ for tripTimeout, instead of nack-looping the backlog toward the DLQ.
# "what counts as an OHIP outage" list is defined once here. These are the HTTP connector errors meaning
# "OHIP unreachable / down / overloaded" (verified against mule-http-connector HttpError). Deliberately
# EXCLUDES HTTP:NOT_FOUND (that is the 404-as-delete success path) and HTTP:TOO_MANY_REQUESTS
ohip.mq.cb.onErrorTypes=HTTP:CONNECTIVITY,HTTP:TIMEOUT,HTTP:SERVICE_UNAVAILABLE,HTTP:BAD_GATEWAY,HTTP:GATEWAY_TIMEOUT
# Consecutive matching failures before the breaker OPENS. Keep this LOW relative to the queue's
# max-delivery-count so an outage trips the breaker BEFORE it burns redeliveries and DLQs good events.
ohip.mq.cb.errorsThreshold=5
# How long the breaker stays OPEN (polling halted) before a half-open trial fetch. Give OHIP time to recover.
ohip.mq.cb.tripTimeout=30
ohip.mq.cb.tripTimeoutUnit=SECONDS

# OHIP REST + OAuth (non-secret - mirrors the producer's config.properties; secrets live in secure.properties)
# LOCAL SIM: host=localhost port=8081 httpProtocol=HTTP
# REAL OHIP: your gateway host, port=443, httpProtocol=HTTPS
ohip.host=localhost
ohip.port=8081
ohip.httpProtocol=HTTP
ohip.oauthScope=urn:opc:hgbu:ws:__myscopes__

# --- Orchestration re-fetch tuning -------------------------------------------------------------------
# fetchInstructions: comma-separated OHIP fetch targets sent as repeated ?fetchInstructions= query params.
# Without them OHIP returns a SPARSE resource (base object only). Set to the minimal set your backend
# upsert actually needs - each extra instruction is more work for OHIP. Valid values are enumerated in
# crm.json (getProfile) and rsv.json (getReservation). Verify the exact set against your tenant.
ohip.rest.profileFetchInstructions=Profile,Communication,Address,Membership
ohip.rest.reservationFetchInstructions=Reservation,RateInfoDetails,DailySummary
# x-hotelid is REQUIRED on getProfile but a chain-level PROFILE event may carry no hotelId. This hotel/hub
# code is the fallback sent when the event has none. Set to a property you have access to across the chain.
ohip.rest.profileHotelId=CHANGE_ME_HOTEL_ID
