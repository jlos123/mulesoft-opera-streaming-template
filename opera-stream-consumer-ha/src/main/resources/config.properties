# Opera OHIP tenant / connection (non-secret - see secure.properties.sample for secrets)
# LOCAL SIM: host=localhost port=8081 httpProtocol=HTTP wsProtocol=WS
# REAL OHIP: your host, port=443, httpProtocol=HTTPS, wsProtocol=WSS
ohip.host=localhost
ohip.port=8081
ohip.httpProtocol=HTTP
ohip.wsProtocol=WS
ohip.chainCode=CHAIN01
ohip.oauthScope=urn:opc:hgbu:ws:__myscopes__

# Reconnect wait times (ms) per close code
ohip.reconnect.wait4409Ms=120000
ohip.reconnect.wait4409JitterMaxMs=30000
ohip.reconnect.wait4504Ms=15000
ohip.reconnect.wait1006Ms=4000
ohip.reconnect.waitDefaultMs=0
# How often the reconnect scheduler polls for a due reconnect. Higher = fewer idle messages (lower
# licensing cost), at the cost of up to this many ms of extra delay before a queued reconnect fires.
ohip.reconnect.schedulerPollMs=15000

# Proactive token refresh
ohip.tokenRefresh.leadTimeMs=120000
ohip.tokenRefresh.checkIntervalMs=30000
ohip.tokenRefresh.completeToSubscribeGapMs=10000

# ============================================================================================
# HIGH AVAILABILITY (symmetric competing-consumer) - the only difference between this app and the base producer.
# ============================================================================================
# ohip.ha.enabled=false  -> this app behaves EXACTLY like the base opera-stream-consumer: on startup it
#   opens the stream and subscribes immediately (single instance, no failover). Deploy ONE replica.
# ohip.ha.enabled=true   -> symmetric competing-consumer mode. Scale it however you need against the SAME (Application Key, Chain):
#     - IN-REGION HA: one CloudHub 2.0 deployment with N replicas (CH2 auto-spreads 2+ replicas across
#       availability zones). No per-replica config is required, so this now works - the earlier "deploy
#       twice, workers:1" rule existed only because roles needed distinct values, which they no longer do.
#     - CROSS-REGION DR: deploy the SAME artifact to a second region. Its replicas join the same
#       competition; OHIP's 4409 lock arbitrates across regions (the lock is global to App Key + Chain,
#       not regional), so no BYO global load balancer is needed for the consumer leg.
#   Each instance follows Oracle's connection-status pattern  open the socket, connection_init, run `query { connection { id status } }`,
#   and only send the event `subscribe` when status == Inactive. The Single-Consumer Lock (4409) is
#   enforced by OHIP on the SUBSCRIBE, not on the socket - so probing status while a peer is active is safe.
ohip.ha.enabled=true

# How often (ms) each instance re-checks connection status while it does NOT hold the subscription.
ohip.ha.statusPollIntervalMs=15000

# Takeover: once status is observed Inactive, every instance waits takeoverDelayMs + random(0..jitterMax)
# before subscribing, and whoever subscribes first wins (the losers get 4409 and back off). The jitter
# breaks ties between any number of instances without a 4409 storm; there is no privileged instance.
ohip.ha.takeoverDelayMs=1000
ohip.ha.takeoverJitterMaxMs=4000

# Offset checkpoint granularity: durably persist the Offset every N events (not per-event).
# Events are already durable in Anypoint MQ, so a crash replays <=N events, Higher = more burst throughput + wider replay window on crash
ohip.offset.persistEveryNEvents=25

# Anypoint MQ handoff (non-secret - see secure.properties.sample for credentials)
anypoint.mq.url=https://mq-eu-west-2.anypoint.mulesoft.com/api/v1/organizations/YOUR_ORG_ID/environments/YOUR_ENVIRONMENT_ID
ohip.mq.destination=dev-opera-stream-exchange