# Opera OHIP tenant / connection (non-secret - see secure.properties.sample for secrets)
# LOCAL SIM: host=localhost port=8081 httpProtocol=HTTP wsProtocol=WS
# REAL OHIP: your host, port=443, httpProtocol=HTTPS, wsProtocol=WSS
ohip.host=localhost
ohip.port=8081
ohip.httpProtocol=HTTP
ohip.wsProtocol=WS
ohip.chainCode=CHAIN01
ohip.oauthScope=urn:opc:hgbu:ws:__myscopes__

#Mule runtime 4.11+ utilises Netty as default HTTP service, which currently rejects handshakes that require subprotocol negotiation
mule.http.service.implementation=GRIZZLY

# Proactive token refresh
ohip.tokenRefresh.leadTimeMs=120000
ohip.tokenRefresh.checkIntervalMs=60000
ohip.tokenRefresh.completeToSubscribeGapMs=10000

# How often (ms) each instance re-checks connection status while it does NOT hold the subscription.
# Failover latency ~= this + takeoverDelayMs + jitter. Events queue up to 7d, so slower failover costs
# latency, not data. Push higher (e.g. 300000) if minutes-scale failover is acceptable.
ohip.ha.statusPollIntervalMs=60000

# Takeover: once status is observed Inactive, every instance waits takeoverDelayMs + random(0..jitterMax)
# before subscribing, and whoever subscribes first wins (the losers get 4409 and back off). The jitter
# breaks ties between any number of instances without a 4409 storm; there is no privileged instance.
ohip.ha.takeoverDelayMs=1000
ohip.ha.takeoverJitterMaxMs=4000

# Offset checkpoint granularity: durably persist the Offset every N events (not per-event).
# Events are already durable in Anypoint MQ, so a crash replays <=N events, Higher = more burst throughput + wider replay window on crash
ohip.offset.persistEveryNEvents=25

# Anypoint MQ handoff (non-secret - see secure.properties.sample for credentials)
anypoint.mq.url=https://mq-eu-west-2.anypoint.mulesoft.com/api/v1/organizations/YOUR_ORG_ID/environments/YOUR_ENVIRONMENT_ID
ohip.mq.destination=dev-opera-stream-exchange
